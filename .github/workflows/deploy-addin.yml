# Build the FREE Local Glean add-in (static, no secrets) and publish it to
# GitHub Pages. This file lives in the addin/ tree so it travels with the code
# when it is pushed to the dedicated PUBLIC repo (GoshtasbSh/Glean_add-in),
# where addin/ becomes the repo root and this becomes .github/workflows/.
# It does NOT run in the private monorepo (GitHub only runs workflows under the
# repository-root .github/workflows/, never a subdirectory).
#
# Pages must be set to "GitHub Actions" as the source (repo Settings > Pages),
# and the repo must be PUBLIC (or on a paid plan) for Pages to serve.
name: Deploy add-in to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One production deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (static FREE build — base path = /Glean_add-in/)
        run: pnpm build
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
