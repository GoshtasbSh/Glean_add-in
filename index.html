<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- NOTE: deliberately NO restrictive meta CSP. A `default-src 'self'` CSP
         prevents the Office.js runtime from initializing inside Outlook
         (Office.onReady never fires → the pane shows the standalone fallback).
         Custody is enforced in CODE instead: the app only ever fetches UF
         NaviGator via the single accessor (src/llm/navigator.ts), the Graph/MSAL
         code is code-split out of the free bundle (App.tsx), and no email content
         is persisted (no localStorage/IndexedDB — in-memory only).
         See docs/ufit/THREAT_MODEL.md §2. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Glean</title>
    <!-- Office.js: SRI exception — Microsoft rolls this CDN continuously (OVERVIEW §6) -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
