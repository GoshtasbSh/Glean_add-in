<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP (FREE build): connect-src is locked to UF NaviGator ONLY. The free
         build contacts no Microsoft Graph / login / SharePoint host at all — the
         Graph/MSAL code is DEV-gated and code-split out of this bundle (App.tsx).
         The POST-UFIT upgrade build re-adds, to connect-src, exactly:
           https://graph.microsoft.com https://login.microsoftonline.com https://*-my.sharepoint.com
         Office.js CDN is the sole SRI exception (OVERVIEW §6). base-uri/form-action
         added per security review. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://api.ai.it.ufl.edu; script-src 'self' https://appsforoffice.microsoft.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Glean</title>
    <!-- Office.js: SRI exception — Microsoft rolls this CDN continuously (OVERVIEW §6) -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
